<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="cabecalho">
            <h3>Portal do Candidato - ENEM</h3>
    </header>

    <div class="box">

        <h1 class="title-box">Login</h1>

        <label for="text">
            Insira seu Email:
            <br>
            <input type="Email" id="email" class="login" placeholder="Digite seu email..." required>
        </label>

        <label for="senha">
            Insira sua Senha:
            <br>
            <input type="password" id="senha" class="login" placeholder="Digite sua senha..." required>
        </label>

        <button class="btn-valid">Entrar</button>
    </div>

    <footer class="rodape">
        <h3>Jhonata Wyllian Da Silva Domingues 17/06/2026 - Copyright ©</h3>
    </footer>

</body>
</html>
